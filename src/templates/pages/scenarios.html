<div x-data="scenariosState()" x-init="init()">
  <h2 style="font-size:2.5rem;margin-bottom:0.5rem;font-family:'Cormorant Garamond',serif;">Scenario Designer</h2>
  <p style="color:var(--text-muted);margin-bottom:2rem;font-size:1rem;">Customize initial conditions and inject anomalies to test agent responses.</p>

  <!-- Initial Conditions -->
  <div class="glass-card" style="margin-bottom:1.25rem;">
    <div class="card-title">Initial Conditions
      <span class="badge badge-success">OPTIONAL</span>
    </div>
    <div class="settings-row">
      <span class="settings-label">Battery Level (%)</span>
      <input type="range" class="settings-slider" min="0" max="100" x-model="conditions.initial_battery">
      <span class="settings-value" x-text="Number(conditions.initial_battery).toFixed(0) + '%'"></span>
    </div>
    <div class="settings-row">
      <span class="settings-label">O2 Level (%)</span>
      <input type="range" class="settings-slider" min="15" max="25" step="0.1" x-model="conditions.initial_o2">
      <span class="settings-value" x-text="Number(conditions.initial_o2).toFixed(1) + '%'"></span>
    </div>
    <div class="settings-row">
      <span class="settings-label">Temperature (°C)</span>
      <input type="range" class="settings-slider" min="10" max="40" step="0.5" x-model="conditions.initial_temperature">
      <span class="settings-value" x-text="Number(conditions.initial_temperature).toFixed(1) + '°C'"></span>
    </div>
    <div class="settings-row">
      <span class="settings-label">CO2 Level (ppm)</span>
      <input type="range" class="settings-slider" min="200" max="2000" step="10" x-model="conditions.initial_co2">
      <span class="settings-value" x-text="Number(conditions.initial_co2).toFixed(0)"></span>
    </div>
    <div class="settings-row">
      <span class="settings-label">Max Cycles</span>
      <input type="range" class="settings-slider" min="1" max="100" x-model="conditions.max_cycles">
      <span class="settings-value" x-text="conditions.max_cycles"></span>
    </div>
  </div>

  <!-- Anomaly Injection -->
  <div class="glass-card" style="margin-bottom:1.25rem;">
    <div class="card-title">Anomaly Injection
      <span class="badge badge-warning">MANUAL</span>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:1rem;align-items:end;">
      <div>
        <div class="mono" style="font-size:0.65rem;color:var(--text-muted);margin-bottom:0.3rem;">Type</div>
        <select x-model="newAnomaly.type" style="width:100%;">
          <option value="dust_storm">Dust Storm</option>
          <option value="pressure_leak">Pressure Leak</option>
          <option value="o2_drop">O2 Drop</option>
          <option value="temperature_spike">Temperature Spike</option>
          <option value="solar_flare">Solar Flare</option>
        </select>
      </div>
      <div>
        <div class="mono" style="font-size:0.65rem;color:var(--text-muted);margin-bottom:0.3rem;">Severity</div>
        <input type="range" class="settings-slider" min="0.1" max="1.0" step="0.1" x-model="newAnomaly.severity">
        <span class="mono" style="font-size:0.75rem;color:var(--text-muted);" x-text="Number(newAnomaly.severity).toFixed(1)"></span>
      </div>
      <div>
        <div class="mono" style="font-size:0.65rem;color:var(--text-muted);margin-bottom:0.3rem;">Trigger Cycle</div>
        <input type="range" class="settings-slider" min="1" max="50" x-model="newAnomaly.trigger_cycle">
        <span class="mono" style="font-size:0.75rem;color:var(--text-muted);" x-text="'C' + newAnomaly.trigger_cycle"></span>
      </div>
      <button class="btn btn-primary btn-sm" @click="addAnomaly()" style="margin-bottom:2px;">+ Add</button>
    </div>

    <!-- Scheduled Anomalies List -->
    <template x-if="anomalies.length > 0">
      <div style="margin-top:1.5rem;border-top:1px solid var(--glass-border);padding-top:1rem;">
        <div class="mono" style="font-size:0.7rem;color:var(--text-muted);margin-bottom:0.5rem;">SCHEDULED ANOMALIES</div>
        <template x-for="(a, i) in anomalies" :key="i">
          <div style="display:flex;align-items:center;gap:1rem;padding:0.5rem;background:rgba(0,0,0,0.15);border-radius:8px;margin-bottom:0.4rem;">
            <span style="color:var(--alert-orange);font-weight:600;" x-text="'⚠ ' + a.type.replace(/_/g, ' ')"></span>
            <span class="mono" style="color:var(--text-muted);" x-text="'C' + a.trigger_cycle"></span>
            <span class="mono" style="color:var(--text-muted);" x-text="'severity: ' + Number(a.severity).toFixed(1)"></span>
            <span style="flex:1;"></span>
            <button @click="anomalies.splice(i,1)" style="background:none;border:none;color:var(--alert-red);cursor:pointer;font-size:1.2rem;">✕</button>
          </div>
        </template>
      </div>
    </template>
  </div>

  <!-- Run Button -->
  <div style="display:flex;gap:1rem;align-items:center;">
    <button class="btn btn-primary" @click="runScenario()" :disabled="running">
      <span x-text="running ? '⟳ Running...' : '▶ Run Scenario'"></span>
    </button>
    <span x-show="error" style="color:var(--alert-red);font-family:'JetBrains Mono',monospace;font-size:0.85rem;" x-text="error"></span>
  </div>
</div>

<script>
function scenariosState() {
  return {
    conditions: {
      initial_battery: 50,
      initial_o2: 19.8,
      initial_temperature: 22.0,
      initial_co2: 400,
      max_cycles: 24
    },
    newAnomaly: {
      type: 'dust_storm',
      severity: 0.5,
      trigger_cycle: 12
    },
    anomalies: [],
    running: false,
    error: '',

    init() {
      fetch('/api/v1/config').then(r => r.json()).then(c => {
        this.conditions.initial_battery = c.initial_battery;
        this.conditions.initial_o2 = c.initial_o2;
        this.conditions.initial_temperature = c.initial_temperature;
        this.conditions.initial_co2 = c.initial_co2;
      });
    },

    addAnomaly() {
      this.anomalies.push({...this.newAnomaly, trigger_cycle: Number(this.newAnomaly.trigger_cycle)});
    },

    async runScenario() {
      this.running = true;
      this.error = '';
      try {
        const resp = await fetch('/api/v1/scenario/run', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            conditions: this.conditions,
            anomalies: this.anomalies,
            max_cycles: this.conditions.max_cycles
          })
        });
        if (!resp.ok) {
          const data = await resp.json();
          this.error = data.message || 'Run failed';
        } else {
          // Navigate to dashboard to show results
          if (typeof htmx !== 'undefined') {
            htmx.ajax('GET', '/dashboard', { target: '#main-content', swap: 'innerHTML' });
          }
          // Update sidebar active state
          const appEl = document.querySelector('[x-data]');
          if (appEl && appEl.__x) appEl.__x.$data.activeNav = 'dashboard';
        }
      } catch(e) {
        this.error = e.message;
      }
      this.running = false;
    }
  };
}
</script>
