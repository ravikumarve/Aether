<div x-data="historyState()" x-init="loadHistory()">
  <h2 style="font-size:2.5rem;margin-bottom:0.5rem;font-family:'Cormorant Garamond',serif;">Simulation History</h2>
  <p style="color:var(--text-muted);margin-bottom:2rem;font-size:1rem;">Browse, review, and export past simulation runs.</p>

  <div class="glass-card">
    <div class="card-title">
      <span>Past Runs</span>
      <div style="display:flex;gap:0.5rem;align-items:center;">
        <!-- Compare button — visible when exactly 2 selected -->
        <button class="btn btn-primary btn-sm" x-show="selected.length === 2"
                @click="openCompare()" style="padding:0.3rem 0.8rem;font-size:0.7rem;">
          🔄 Compare Selected
        </button>
        <span x-show="selected.length > 0 && selected.length !== 2"
              style="font-size:0.7rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace;"
              x-text="'(' + selected.length + ' selected — select exactly 2)'"></span>
        <button class="btn btn-sm" style="padding:0.3rem 0.8rem;font-size:0.7rem;" @click="exportAll()">Export All JSON</button>
        <button class="btn btn-sm" style="padding:0.3rem 0.8rem;font-size:0.7rem;border-color:var(--alert-red);color:var(--alert-red);" @click="clearAll()">Clear All</button>
      </div>
    </div>

    <template x-if="runs.length === 0">
      <div style="color:var(--text-muted);font-size:0.85rem;text-align:center;padding:3rem 0;">
        No simulation runs yet — go to <strong>Dashboard</strong> or <strong>Scenarios</strong> to run one.
      </div>
    </template>

    <template x-if="runs.length > 0">
      <div>
        <!-- Table header -->
        <div style="display:grid;grid-template-columns:36px 40px 1fr 80px 100px 100px 100px 100px;gap:0.5rem;padding:0.75rem 1rem;background:rgba(0,0,0,0.2);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--text-muted);text-transform:uppercase;margin-bottom:0.5rem;">
          <span></span>
          <span>#</span>
          <span>Date/Time</span>
          <span>Cycles</span>
          <span>Anomalies</span>
          <span>Emergencies</span>
          <span>Status</span>
          <span></span>
        </div>

        <!-- Table rows -->
        <template x-for="(run, i) in runs" :key="run.id">
          <div style="display:grid;grid-template-columns:36px 40px 1fr 80px 100px 100px 100px 100px;gap:0.5rem;padding:0.7rem 1rem;border-bottom:1px solid rgba(255,255,255,0.03);align-items:center;cursor:pointer;transition:background 0.2s;"
               @click="viewDetail(run.id)"
               @mouseover="$el.style.background='rgba(16,185,129,0.05)'"
               @mouseout="$el.style.background='transparent'">
            <!-- Checkbox for comparison selection -->
            <input type="checkbox" :checked="selected.includes(run.id)"
                   @click.stop="toggleSelect(run.id)"
                   style="accent-color:var(--bio-emerald);cursor:pointer;width:16px;height:16px;">
            <span style="color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:0.75rem;" x-text="runs.length - i"></span>
            <span style="color:var(--text-main);font-size:0.85rem;" x-text="formatTime(run.timestamp)"></span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;" x-text="run.total_cycles"></span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--alert-orange);" x-text="run.anomalies_handled"></span>
            <span style="font-family:'JetBrains Mono',monospace;font-size:0.8rem;color:var(--alert-red);" x-text="run.emergency_responses"></span>
            <span>
              <span class="badge" :class="run.final_status === 'COMPLETED' ? 'badge-success' : 'badge-danger'"
                    x-text="run.final_status === 'COMPLETED' ? '✅ PASS' : '❌ FAIL'"
                    style="font-size:0.6rem;"></span>
            </span>
            <span style="display:flex;gap:0.4rem;align-items:center;">
              <span style="color:var(--bio-emerald);font-size:1.2rem;cursor:pointer;" @click.stop="viewDetail(run.id)">→</span>
              <button class="mono" @click.stop="openReplay(run.id)"
                      style="background:rgba(34,211,238,0.12);color:var(--cyber-teal);border:1px solid rgba(34,211,238,0.25);border-radius:4px;padding:0.15rem 0.4rem;font-size:0.55rem;cursor:pointer;white-space:nowrap;">▶ Replay</button>
            </span>
          </div>
        </template>
      </div>
    </template>
  </div>

  <!-- Detail Modal -->
  <template x-if="detail">
    <div style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);z-index:1000;display:flex;align-items:center;justify-content:center;" @click.self="detail = null">
      <div class="glass-card" style="max-width:700px;width:90%;max-height:80vh;overflow-y:auto;padding:2rem;">
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:1.5rem;">
          <h3 style="font-size:1.8rem;font-family:'Cormorant Garamond',serif;margin:0;">Run #<span x-text="detail.id"></span></h3>
          <button @click="detail = null" style="background:none;border:none;color:var(--text-muted);font-size:1.5rem;cursor:pointer;">✕</button>
        </div>

        <div class="mono" style="font-size:0.75rem;color:var(--text-muted);margin-bottom:1.5rem;" x-text="formatTime(detail.timestamp)"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;">
          <div style="background:rgba(0,0,0,0.2);padding:1rem;border-radius:12px;">
            <div class="mono" style="font-size:0.6rem;color:var(--text-muted);">TOTAL CYCLES</div>
            <div style="font-size:2rem;font-family:'JetBrains Mono',monospace;" x-text="detail.total_cycles"></div>
          </div>
          <div style="background:rgba(0,0,0,0.2);padding:1rem;border-radius:12px;">
            <div class="mono" style="font-size:0.6rem;color:var(--text-muted);">FINAL STATUS</div>
            <div style="font-size:2rem;font-family:'JetBrains Mono',monospace;" :style="'color:' + (detail.final_status === 'COMPLETED' ? 'var(--bio-emerald)' : 'var(--alert-red)')" x-text="detail.final_status"></div>
          </div>
        </div>

        <div class="mono" style="font-size:0.65rem;color:var(--text-muted);margin-bottom:0.5rem;">CONFIGURATION SNAPSHOT</div>
        <div class="agent-log" style="max-height:200px;">
          <template x-for="(value, key) in detail.config || {}" :key="key">
            <div class="log-entry" style="display:flex;gap:1rem;">
              <span style="color:var(--bio-emerald);" x-text="key"></span>
              <span x-text="JSON.stringify(value)"></span>
            </div>
          </template>
        </div>

        <div style="margin-top:1rem;display:flex;gap:1rem;">
          <button class="btn btn-primary btn-sm" @click="exportRun(detail)">Export JSON</button>
          <button class="btn btn-sm" @click="detail = null">Close</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Compare Modal -->
  <template x-if="compare">
    <div style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);z-index:1000;display:flex;align-items:center;justify-content:center;" @click.self="compare = null">
      <div class="glass-card" style="max-width:900px;width:92%;max-height:85vh;overflow-y:auto;padding:2rem;">
        <!-- Header -->
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:1.5rem;">
          <h3 style="font-size:1.6rem;font-family:'Cormorant Garamond',serif;margin:0;">Simulation Comparison</h3>
          <button @click="compare = null" style="background:none;border:none;color:var(--text-muted);font-size:1.5rem;cursor:pointer;">✕</button>
        </div>

        <!-- Side-by-side stats -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem;">
          <div style="background:rgba(0,0,0,0.2);padding:1rem;border-radius:12px;border-left:3px solid var(--bio-emerald);">
            <div class="mono" style="font-size:0.6rem;color:var(--bio-emerald);">RUN A — #<span x-text="compare.a.id"></span></div>
            <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.8rem;" x-text="compare.a.ts"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;">
              <div><span class="mono" style="font-size:0.6rem;color:var(--text-muted);">Cycles</span><br><span class="mono" style="font-size:1.2rem;" x-text="compare.a.cycles"></span></div>
              <div><span class="mono" style="font-size:0.6rem;color:var(--text-muted);">Status</span><br><span class="badge" :class="compare.a.status === 'COMPLETED' ? 'badge-success' : 'badge-danger'" style="font-size:0.6rem;" x-text="compare.a.status"></span></div>
              <div><span class="mono" style="font-size:0.6rem;color:var(--text-muted);">Anomalies</span><br><span style="font-size:1rem;color:var(--alert-orange);" x-text="compare.a.anomalies"></span></div>
              <div><span class="mono" style="font-size:0.6rem;color:var(--text-muted);">Emergencies</span><br><span style="font-size:1rem;color:var(--alert-red);" x-text="compare.a.emergencies"></span></div>
            </div>
          </div>
          <div style="background:rgba(0,0,0,0.2);padding:1rem;border-radius:12px;border-left:3px solid var(--sun-ray);">
            <div class="mono" style="font-size:0.6rem;color:var(--sun-ray);">RUN B — #<span x-text="compare.b.id"></span></div>
            <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:0.8rem;" x-text="compare.b.ts"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;">
              <div><span class="mono" style="font-size:0.6rem;color:var(--text-muted);">Cycles</span><br><span class="mono" style="font-size:1.2rem;" x-text="compare.b.cycles"></span></div>
              <div><span class="mono" style="font-size:0.6rem;color:var(--text-muted);">Status</span><br><span class="badge" :class="compare.b.status === 'COMPLETED' ? 'badge-success' : 'badge-danger'" style="font-size:0.6rem;" x-text="compare.b.status"></span></div>
              <div><span class="mono" style="font-size:0.6rem;color:var(--text-muted);">Anomalies</span><br><span style="font-size:1rem;color:var(--alert-orange);" x-text="compare.b.anomalies"></span></div>
              <div><span class="mono" style="font-size:0.6rem;color:var(--text-muted);">Emergencies</span><br><span style="font-size:1rem;color:var(--alert-red);" x-text="compare.b.emergencies"></span></div>
            </div>
          </div>
        </div>

        <!-- Metric diff highlights -->
        <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem;">
          <template x-for="(diff, key) in compare.diffs" :key="key">
            <div style="background:rgba(0,0,0,0.15);padding:0.5rem 1rem;border-radius:8px;display:flex;align-items:center;gap:0.5rem;">
              <span class="mono" style="font-size:0.65rem;color:var(--text-muted);" x-text="key"></span>
              <span style="font-size:0.85rem;color:var(--bio-emerald);" x-text="diff.a"></span>
              <span style="color:var(--text-muted);font-size:0.7rem;">vs</span>
              <span style="font-size:0.85rem;color:var(--sun-ray);" x-text="diff.b"></span>
              <span :style="'font-size:0.7rem;color:' + (diff.arrow === '▲' ? 'var(--alert-red)' : diff.arrow === '▼' ? 'var(--bio-emerald)' : 'var(--text-muted)')" x-text="diff.arrow + ' ' + diff.pct"></span>
            </div>
          </template>
        </div>

        <!-- Overlay Sparklines -->
        <div class="mono" style="font-size:0.65rem;color:var(--text-muted);margin-bottom:0.5rem;">BATTERY COMPARISON</div>
        <div class="compare-chart" x-html="compare.charts.battery"></div>

        <div class="mono" style="font-size:0.65rem;color:var(--text-muted);margin-top:1rem;margin-bottom:0.5rem;">O2 LEVEL COMPARISON</div>
        <div class="compare-chart" x-html="compare.charts.o2"></div>

        <!-- Close button -->
        <div style="margin-top:1.5rem;display:flex;gap:1rem;">
          <button class="btn btn-primary btn-sm" @click="exportCompare()">Export Comparison JSON</button>
          <button class="btn btn-sm" @click="compare = null">Close</button>
        </div>
      </div>
    </div>
  </template>

  <!-- Replay Modal -->
  <template x-if="replay">
    <div style="position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);z-index:1000;display:flex;align-items:center;justify-content:center;" @click.self="closeReplay()">
      <div class="glass-card" style="max-width:800px;width:92%;max-height:90vh;overflow-y:auto;padding:2rem;">
        <!-- Header -->
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:1rem;">
          <div>
            <h3 style="font-size:1.8rem;font-family:'Cormorant Garamond',serif;margin:0;">
              <span style="color:var(--cyber-teal);">▶</span> Replay Run #<span x-text="replay.id"></span>
            </h3>
            <div class="mono" style="font-size:0.7rem;color:var(--text-muted);margin-top:0.3rem;" x-text="replay.timestamp"></div>
          </div>
          <button @click="closeReplay()" style="background:none;border:none;color:var(--text-muted);font-size:1.5rem;cursor:pointer;">✕</button>
        </div>

        <!-- Cycle scrubber + play controls -->
        <div style="background:rgba(0,0,0,0.2);padding:1rem;border-radius:12px;margin-bottom:1rem;">
          <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
            <div style="display:flex;align-items:center;gap:0.3rem;">
              <button @click="togglePlay()" style="background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.3);border-radius:6px;padding:0.3rem 0.7rem;cursor:pointer;font-size:1rem;color:var(--bio-emerald);">
                <span x-text="replayPlaying ? '⏸' : '▶'"></span>
              </button>
            </div>
            <div style="flex:1;min-width:150px;">
              <input type="range" min="1" :max="replayTotal" x-model="replayCycle" @input="seekCycle()"
                     style="width:100%;accent-color:var(--cyber-teal);">
            </div>
            <span class="mono" style="color:var(--cyber-teal);font-size:0.85rem;min-width:60px;text-align:right;">
              C<span x-text="replayCycle"></span>/<span x-text="replayTotal"></span>
            </span>
            <div style="display:flex;gap:0.3rem;">
              <span class="mono" style="font-size:0.6rem;color:var(--text-muted);padding:0.2rem 0.3rem;">Speed</span>
              <button class="mono" @click="replaySpeed = 0.5; if(replayPlaying){restartReplay()}" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:0.2rem 0.5rem;cursor:pointer;font-size:0.6rem;color:var(--text-muted);">½×</button>
              <button class="mono" @click="replaySpeed = 1; if(replayPlaying){restartReplay()}" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:0.2rem 0.5rem;cursor:pointer;font-size:0.6rem;color:var(--text-muted);">1×</button>
              <button class="mono" @click="replaySpeed = 2; if(replayPlaying){restartReplay()}" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:0.2rem 0.5rem;cursor:pointer;font-size:0.6rem;color:var(--text-muted);">2×</button>
              <button class="mono" @click="replaySpeed = 4; if(replayPlaying){restartReplay()}" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:0.2rem 0.5rem;cursor:pointer;font-size:0.6rem;color:var(--text-muted);">4×</button>
            </div>
          </div>
        </div>

        <!-- Metric cards at current cycle -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:1rem;">
          <div style="background:rgba(0,0,0,0.15);padding:0.7rem 1rem;border-radius:10px;border-left:3px solid var(--bio-emerald);">
            <div class="mono" style="font-size:0.55rem;color:var(--text-muted);text-transform:uppercase;">Battery</div>
            <div style="display:flex;justify-content:space-between;align-items:baseline;">
              <span style="font-size:1.8rem;font-family:'JetBrains Mono',monospace;color:var(--bio-emerald);" x-text="replayMetric('battery') + '%'"></span>
              <span class="mono" style="font-size:0.6rem;color:var(--text-muted);" x-text="'min 40%'"></span>
            </div>
            <div style="height:5px;background:rgba(0,0,0,0.3);border-radius:4px;margin-top:0.3rem;overflow:hidden;">
              <div style="height:100%;border-radius:4px;background:var(--bio-emerald);transition:width 0.15s;" :style="'width:' + Math.min(replayMetric('battery'), 100) + '%'"></div>
            </div>
          </div>
          <div style="background:rgba(0,0,0,0.15);padding:0.7rem 1rem;border-radius:10px;border-left:3px solid var(--sun-ray);">
            <div class="mono" style="font-size:0.55rem;color:var(--text-muted);text-transform:uppercase;">O₂ Level</div>
            <div style="display:flex;justify-content:space-between;align-items:baseline;">
              <span style="font-size:1.8rem;font-family:'JetBrains Mono',monospace;color:var(--sun-ray);" x-text="replayMetric('o2') + '%'"></span>
              <span class="mono" style="font-size:0.6rem;color:var(--text-muted);" x-text="'min 19.5%'"></span>
            </div>
            <div style="height:5px;background:rgba(0,0,0,0.3);border-radius:4px;margin-top:0.3rem;overflow:hidden;">
              <div style="height:100%;border-radius:4px;background:var(--sun-ray);transition:width 0.15s;" :style="'width:' + (replayMetric('o2') / 25 * 100) + '%'"></div>
            </div>
          </div>
          <div style="background:rgba(0,0,0,0.15);padding:0.7rem 1rem;border-radius:10px;border-left:3px solid var(--cyber-teal);">
            <div class="mono" style="font-size:0.55rem;color:var(--text-muted);text-transform:uppercase;">Temperature</div>
            <div style="display:flex;justify-content:space-between;align-items:baseline;">
              <span style="font-size:1.8rem;font-family:'JetBrains Mono',monospace;color:var(--cyber-teal);" x-text="replayMetric('temperature') + '°C'"></span>
              <span class="mono" style="font-size:0.6rem;color:var(--text-muted);" x-text="'18-26°C zone'"></span>
            </div>
            <div style="height:5px;background:rgba(0,0,0,0.3);border-radius:4px;margin-top:0.3rem;overflow:hidden;">
              <div style="height:100%;border-radius:4px;background:var(--cyber-teal);transition:width 0.15s;" :style="'width:' + (replayMetric('temperature') / 30 * 100) + '%'"></div>
            </div>
          </div>
          <div style="background:rgba(0,0,0,0.15);padding:0.7rem 1rem;border-radius:10px;border-left:3px solid #a78bfa;">
            <div class="mono" style="font-size:0.55rem;color:var(--text-muted);text-transform:uppercase;">Power</div>
            <div style="display:flex;justify-content:space-between;align-items:baseline;">
              <span style="font-size:1.2rem;font-family:'JetBrains Mono',monospace;color:#a78bfa;" x-text="replayMetric('power_generation') + 'W / ' + replayMetric('power_consumption') + 'W'"></span>
              <span class="mono" style="font-size:0.6rem;color:var(--text-muted);" x-text="'gen / cons'"></span>
            </div>
            <div style="height:5px;background:rgba(0,0,0,0.3);border-radius:4px;margin-top:0.3rem;overflow:hidden;">
              <div style="height:100%;border-radius:4px;background:#a78bfa;transition:width 0.15s;" :style="'width:' + Math.min(replayMetric('power_generation') / 10, 100) + '%'"></div>
            </div>
          </div>
        </div>

        <!-- Status row: Goldilocks + Quality gates + Anomalies -->
        <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem;padding:0.6rem 1rem;background:rgba(0,0,0,0.1);border-radius:8px;">
          <span class="mono" style="font-size:0.65rem;color:var(--text-muted);">STATUS</span>
          <span class="badge" :class="replayIsGoldilocks ? 'badge-success' : 'badge-danger'"
                style="font-size:0.6rem;" x-text="replayIsGoldilocks ? '✅ GOLDILOCKS ZONE' : '⚠ ZONE VIOLATION'"></span>
          <template x-for="(g, gkey) in replayGates" :key="gkey">
            <span class="badge" :class="g === 'PASS' ? 'badge-success' : 'badge-warning'"
                  style="font-size:0.55rem;" x-text="gkey.toUpperCase() + ' ' + g"></span>
          </template>
          <template x-for="at in replayAnomalyTypes" :key="at">
            <span style="background:rgba(251,191,36,0.12);color:var(--alert-orange);border:1px solid rgba(251,191,36,0.3);border-radius:4px;padding:0.1rem 0.4rem;font-size:0.55rem;font-family:'JetBrains Mono',monospace;">
              ⚠ <span x-text="at.replace(/_/g, ' ')"></span>
            </span>
          </template>
        </div>

        <!-- Mini sparkline with cursor -->
        <div class="mono" style="font-size:0.6rem;color:var(--text-muted);margin-bottom:0.3rem;">BATTERY TIMELINE</div>
        <div style="background:rgba(0,0,0,0.12);border-radius:6px;padding:0.4rem 0.6rem;">
          <div x-html="replaySparkline"></div>
        </div>

        <!-- Close -->
        <div style="margin-top:1rem;display:flex;gap:1rem;">
          <button class="btn btn-sm" @click="closeReplay()">Close</button>
        </div>
      </div>
    </div>
  </template>
</div>

<script>
function historyState() {
  return {
    runs: [],
    detail: null,
    selected: [],
    compare: null,

    // Replay state
    replay: null,
    replayCycle: 1,
    replayPlaying: false,
    replaySpeed: 1,
    replayTimer: null,
    replayTelemetry: [],
    replayTotal: 1,
    replayIsGoldilocks: false,
    replayGates: {},
    replayAnomalyTypes: [],
    replaySparkline: '',

    async loadHistory() {
      try {
        const resp = await fetch('/api/v1/history/list');
        this.runs = await resp.json();
      } catch(e) {
        console.warn('History load failed:', e);
      }
    },

    formatTime(ts) {
      if (!ts) return '';
      const d = new Date(ts);
      return d.toLocaleDateString() + ' ' + d.toLocaleTimeString();
    },

    async viewDetail(id) {
      try {
        const resp = await fetch('/api/v1/history/' + id);
        this.detail = await resp.json();
      } catch(e) {
        console.warn('Detail load failed:', e);
      }
    },

    // ── Comparison Selection ──

    toggleSelect(id) {
      const idx = this.selected.indexOf(id);
      if (idx >= 0) {
        this.selected.splice(idx, 1);
      } else {
        if (this.selected.length >= 2) return; // max 2
        this.selected.push(id);
      }
    },

    // ── Comparison Sparkline Helpers ──

    comparePoints(valuesA, valuesB, width, height) {
      // Returns overlay SVG with two lines
      const n = Math.max(valuesA.length, valuesB.length, 2);
      const allVals = [...valuesA, ...valuesB].filter(v => v > 0 || v === 0);
      const max = Math.max(...allVals, 0.001);
      const min = Math.min(...allVals, 0);
      const range = max - min || 1;

      const ptsA = valuesA.map((v, i) => {
        const x = (i / (n - 1)) * width;
        const y = height - ((v - min) / range) * (height * 0.85) - (height * 0.05);
        return x.toFixed(1) + ',' + y.toFixed(1);
      }).join(' ');

      const ptsB = valuesB.map((v, i) => {
        const x = (i / (n - 1)) * width;
        const y = height - ((v - min) / range) * (height * 0.85) - (height * 0.05);
        return x.toFixed(1) + ',' + y.toFixed(1);
      }).join(' ');

      const areaA = '0,' + height + ' ' + ptsA + ' ' + width + ',' + height;
      const areaB = '0,' + height + ' ' + ptsB + ' ' + width + ',' + height;

      return '<svg width="100%" height="60" viewBox="0 0 ' + width + ' ' + height + '" style="display:block;" xmlns="http://www.w3.org/2000/svg">' +
        '<defs>' +
        '<linearGradient id="cmpA" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#10b981" stop-opacity="0.2"/><stop offset="100%" stop-color="#10b981" stop-opacity="0.02"/></linearGradient>' +
        '<linearGradient id="cmpB" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fcd34d" stop-opacity="0.2"/><stop offset="100%" stop-color="#fcd34d" stop-opacity="0.02"/></linearGradient>' +
        '</defs>' +
        '<polygon points="' + areaA + '" fill="url(#cmpA)"/>' +
        '<polyline points="' + ptsA + '" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>' +
        (valuesA.length > 0 ? '<circle cx="' + ptsA.split(' ').pop().split(',')[0] + '" cy="' + ptsA.split(' ').pop().split(',')[1] + '" r="3" fill="#10b981"/>' : '') +
        '<polygon points="' + areaB + '" fill="url(#cmpB)"/>' +
        '<polyline points="' + ptsB + '" fill="none" stroke="#fcd34d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4,2"/>' +
        (valuesB.length > 0 ? '<circle cx="' + ptsB.split(' ').pop().split(',')[0] + '" cy="' + ptsB.split(' ').pop().split(',')[1] + '" r="3" fill="#fcd34d"/>' : '') +
        '<line x1="0" y1="0" x2="0" y2="' + height + '" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>' +
        '<line x1="' + width + '" y1="0" x2="' + width + '" y2="' + height + '" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>' +
        '</svg>';
    },

    // ── Comparison Engine ──

    async openCompare() {
      if (this.selected.length !== 2) return;
      const ids = this.selected.slice().sort((a, b) => a - b);
      try {
        const [respA, respB] = await Promise.all([
          fetch('/api/v1/history/' + ids[0]),
          fetch('/api/v1/history/' + ids[1])
        ]);
        const dataA = await respA.json();
        const dataB = await respB.json();

        const telA = dataA.telemetry || [];
        const telB = dataB.telemetry || [];

        // Extract metric series
        const batA = telA.map(p => p.battery || 0);
        const batB = telB.map(p => p.battery || 0);
        const o2A = telA.map(p => p.o2 || 0);
        const o2B = telB.map(p => p.o2 || 0);

        // Compute diffs
        const diff = (a, b, label) => ({
          a: a,
          b: b,
          arrow: a > b ? '▲' : a < b ? '▼' : '—',
          pct: b > 0 ? ((a - b) / b * 100).toFixed(1) + '%' : '—'
        });

        this.compare = {
          a: {
            id: dataA.id,
            ts: this.formatTime(dataA.timestamp),
            cycles: dataA.report?.total_cycles || telA.length,
            status: dataA.report?.final_status || 'UNKNOWN',
            anomalies: dataA.report?.anomalies_handled || 0,
            emergencies: dataA.report?.emergency_responses || 0
          },
          b: {
            id: dataB.id,
            ts: this.formatTime(dataB.timestamp),
            cycles: dataB.report?.total_cycles || telB.length,
            status: dataB.report?.final_status || 'UNKNOWN',
            anomalies: dataB.report?.anomalies_handled || 0,
            emergencies: dataB.report?.emergency_responses || 0
          },
          diffs: {
            'Anomalies': diff(dataA.report?.anomalies_handled || 0, dataB.report?.anomalies_handled || 0, 'anomalies'),
            'Emergencies': diff(dataA.report?.emergency_responses || 0, dataB.report?.emergency_responses || 0, 'emergencies'),
            'Battery End': diff(
              telA.length > 0 ? telA[telA.length-1].battery : 0,
              telB.length > 0 ? telB[telB.length-1].battery : 0,
              '%'),
            'O2 End': diff(
              telA.length > 0 ? telA[telA.length-1].o2 : 0,
              telB.length > 0 ? telB[telB.length-1].o2 : 0,
              '%')
          },
          charts: {
            battery: this.comparePoints(batA, batB, 400, 60),
            o2: this.comparePoints(o2A, o2B, 400, 60)
          }
        };
      } catch(e) {
        console.warn('Compare failed:', e);
      }
    },

    exportCompare() {
      if (!this.compare) return;
      const blob = new Blob([JSON.stringify(this.compare, null, 2)], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'aether-compare.json';
      a.click();
    },

    exportRun(run) {
      const blob = new Blob([JSON.stringify(run, null, 2)], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'aether-run-' + run.id + '.json';
      a.click();
    },

    exportAll() {
      const blob = new Blob([JSON.stringify(this.runs, null, 2)], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'aether-history.json';
      a.click();
    },

    async clearAll() {
      if (!confirm('Clear all simulation history?')) return;
      await fetch('/api/v1/history/clear', {method: 'POST'});
      this.runs = [];
      this.selected = [];
    },

    // ── Replay Methods ──

    async openReplay(id) {
      // Clear any existing timer
      if (this.replayTimer) clearInterval(this.replayTimer);
      this.replayPlaying = false;
      this.replayTimer = null;

      try {
        const resp = await fetch('/api/v1/history/' + id);
        const data = await resp.json();
        this.replay = {
          id: data.id,
          timestamp: this.formatTime(data.timestamp),
        };
        this.replayTelemetry = data.telemetry || [];
        this.replayTotal = this.replayTelemetry.length;
        this.replayCycle = 1;
        this.replaySparkline = this.buildReplaySparkline();
        this.seekCycle(); // Update first cycle display
      } catch(e) {
        console.warn('Replay load failed:', e);
      }
    },

    closeReplay() {
      if (this.replayTimer) clearInterval(this.replayTimer);
      this.replayTimer = null;
      this.replayPlaying = false;
      this.replay = null;
      this.replayTelemetry = [];
    },

    seekCycle() {
      const idx = this.replayCycle - 1;
      const pt = this.replayTelemetry[idx];
      if (!pt) return;
      // The replayIsGoldilocks, replayGates, replayAnomalyTypes are read by the template
      // They're set as component state so Alpine reactivity picks them up
      this.replayIsGoldilocks = pt.is_goldilocks_zone || false;
      this.replayGates = pt.quality_gates || {};
      this.replayAnomalyTypes = pt.anomaly_types || [];
      // Update sparkline cursor position
      this.replaySparkline = this.buildReplaySparkline();
    },

    togglePlay() {
      if (this.replayPlaying) {
        this.replayPlaying = false;
        if (this.replayTimer) clearInterval(this.replayTimer);
        this.replayTimer = null;
      } else {
        this.replayPlaying = true;
        this.replayTimer = setInterval(() => this.replayTick(), 500 / this.replaySpeed);
      }
    },

    restartReplay() {
      if (this.replayTimer) clearInterval(this.replayTimer);
      if (this.replayPlaying) {
        this.replayTimer = setInterval(() => this.replayTick(), 500 / this.replaySpeed);
      }
    },

    replayTick() {
      if (!this.replayPlaying) return;
      if (this.replayCycle >= this.replayTotal) {
        this.replayPlaying = false;
        if (this.replayTimer) clearInterval(this.replayTimer);
        this.replayTimer = null;
        return;
      }
      this.replayCycle++;
      this.seekCycle();
    },

    replayMetric(key) {
      const idx = this.replayCycle - 1;
      const pt = this.replayTelemetry[idx];
      if (!pt) return 0;
      return pt[key] || 0;
    },

    buildReplaySparkline() {
      const tel = this.replayTelemetry;
      if (tel.length < 2) return '';
      const width = 500, height = 40;
      const bats = tel.map(t => t.battery || 0);
      // Find cursor
      const cursorIdx = this.replayCycle - 1;
      const maxBat = Math.max(...bats, 0.001);
      const minBat = Math.min(...bats, 0);
      const range = maxBat - minBat || 1;
      const n = tel.length;

      const pts = bats.map((v, i) => {
        const x = (i / (n - 1)) * width;
        const y = height - ((v - minBat) / range) * (height * 0.85) - (height * 0.05);
        return x.toFixed(1) + ',' + y.toFixed(1);
      }).join(' ');

      const cx = (cursorIdx / (n - 1)) * width;
      const cy = height - ((bats[cursorIdx] - minBat) / range) * (height * 0.85) - (height * 0.05);

      return '<svg width="100%" height="' + height + '" viewBox="0 0 ' + width + ' ' + height + '" style="display:block;" xmlns="http://www.w3.org/2000/svg">' +
        '<polyline points="' + pts + '" fill="none" stroke="rgba(16,185,129,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
        '<line x1="' + cx.toFixed(1) + '" y1="0" x2="' + cx.toFixed(1) + '" y2="' + height + '" stroke="rgba(34,211,238,0.8)" stroke-width="1.5" stroke-dasharray="3,2"/>' +
        '<circle cx="' + cx.toFixed(1) + '" cy="' + cy.toFixed(1) + '" r="4" fill="var(--cyber-teal)" stroke="rgba(0,0,0,0.4)" stroke-width="1"/>' +
        '<line x1="0" y1="0" x2="0" y2="' + height + '" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>' +
        '<line x1="' + width + '" y1="0" x2="' + width + '" y2="' + height + '" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>' +
        '</svg>';
    },
  };
}
</script>
